version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    restart: always
    ports:
      - "80:80"
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
    depends_on:
      - db
    volumes:
      # Mount storage so uploaded files and logs persist across container restarts
      - ./storage:/var/www/html/storage
      # Mount .env so Laravel can read configuration and write the APP_KEY
      - ./.env:/var/www/html/.env

  db:
    image: mariadb:10.11
    container_name: laravel_db
    restart: always
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_USER: laravel_user511
      MYSQL_PASSWORD: laravel_password511
      MYSQL_ROOT_PASSWORD: laravel_root_password
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  db-data:
